# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/configuration.html

# Module Name (optional)
# ----------------------
# Set this if your importable module name differs from the project name.
# Example: project 'py-yaml12' with module name 'yaml12'
# module: yaml12

# Docstring Parser
# ----------------
# The docstring format used in your package (numpy, google, or sphinx)
parser: numpy

# Dynamic Introspection
# ---------------------
# Use runtime introspection for more accurate documentation (default: true)
# Set to false if your package has cyclic alias issues (e.g., PyO3/Rust bindings)
dynamic: true

# API Discovery Settings
# ----------------------
# Exclude items from auto-documentation
# exclude:
#   - InternalClass
#   - helper_function

# Logo & Favicon
# ---------------
# Point to a single logo file (replaces the text title in the navbar):
# logo: assets/logo.svg
#
# For light/dark variants:
# logo:
#   light: assets/logo-light.svg
#   dark: assets/logo-dark.svg
#
# To show the text title alongside the logo, add: show_title: true

# Author Information
# ------------------
# Author metadata for display in the landing page sidebar
# You can add additional fields: github, orcid, affiliation, homepage
authors:
  - name: Brady Johnston
    role: Author
    # affiliation:
    email: brady.johnston@me.com
    github: BradyAJohnston
    # orcid:
    homepage: https://bradyajohnston.github.io

# Funding / Copyright Holder
# --------------------------
# Credit the organization that funds or holds copyright for this package.
# Displays in sidebar and footer. Homepage and ROR provide links.
# funding:
#   name: "Posit Software, PBC"
#   roles:
#     - Copyright holder
#     - funder
#   homepage: https://posit.co
#   ror: https://ror.org/03wc8by49

# API Reference Structure
# -----------------------
# Customize the sections below to organize your API documentation.
# - Reorder items within a section to change their display order
# - Move items between sections or create new sections
# - Use 'members: false' to exclude methods from documentation
# - Add 'desc:' to sections for descriptions

inline_methods: true
include_inherited: true

reference:
  - title: Interface
    include_inherited: True
    contents:
      - builder.tree
      - builder.socket
      - builder.node
      - builder.accessor
      - TreeBuilder
      - builder.BaseNode
  - title: Assets
    desc: Generating classes from pre-build assets
    contents:
      - assets.generate_asset_api
      - assets.AssetLibrary
      - assets.BundledLibrary
      - assets.PackageLibrary
  - title: Export
    desc: Exporting node trees to code.
    contents:
      - export.to_python
      - export.to_mermaid

  - title: Geometry Nodes
    desc: Nodes use in Geometry Nodes trees.
    contents:
      - nodes.geometry.input
      - nodes.geometry.attribute
      - nodes.geometry.assets
      - nodes.geometry.color
      - nodes.geometry.converter
      - nodes.geometry.texture
      - nodes.geometry.grid
      - nodes.geometry.groups
      - nodes.geometry.geometry
      - nodes.geometry.attribute
      - nodes.geometry.vector
      - nodes.geometry.manual
      - nodes.geometry.zone

  - title: Shader Nodes
    desc: Nodes use in Material / Shader node trees
    contents:
      - nodes.shader.color
      - nodes.shader.converter
      - nodes.shader.grid
      - nodes.shader.group
      - nodes.shader.input
      - nodes.shader.manual
      - nodes.shader.output
      - nodes.shader.script
      - nodes.shader.shader
      - nodes.shader.texture
      - nodes.shader.vector
      - nodes.shader.assets
  - title: Compositor Nodes
    desc: Nodes for use in the compositor
    contents:
      - nodes.compositor.color
      - nodes.compositor.converter
      - nodes.compositor.distort
      - nodes.compositor.filter
      - nodes.compositor.group
      - nodes.compositor.input
      - nodes.compositor.interface
      - nodes.compositor.manual
      - nodes.compositor.matte
      - nodes.compositor.output
      - nodes.compositor.vector
      - nodes.compositor.assets

# Site URL
# --------
# Canonical address of the deployed documentation site.
# Required for subdirectory deployments, skills page install commands,
# .well-known/ discovery, and sitemaps.
site_url: "https://bradyajohnston.github.io/nodebpy"

# Site Settings
# -------------
# site:
#   theme: flatly              # Quarto theme (default: flatly)
#   toc: true                  # Show table of contents (default: true)
#   toc-depth: 2               # TOC heading depth (default: 2)
#   toc-title: On this page    # TOC title (default: "On this page")

# Jupyter Kernel
# --------------
# Jupyter kernel to use for executing code cells in .qmd files.
# This is set at the project level so it applies to all pages, including
# auto-generated API reference pages. Can be overridden in individual .qmd
# file frontmatter if needed for special cases.
jupyter: python3

# CLI Documentation
# -----------------
# cli:
#   enabled: true              # Enable CLI documentation
#   module: my_package.cli     # Module containing Click commands
#   name: cli                  # Name of the Click command object
